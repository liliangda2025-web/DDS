spring:
  application:
    name: DQCADIRSystem
  servlet:
    multipart:
      # 单个业务文件最大允许 500 MiB。
      max-file-size: 500MB
      # 批量上传业务总大小限制为 1 GiB；这里额外预留 multipart 边界和请求头空间。
      max-request-size: 1030MB
      # 0 表示 multipart 内容直接写入临时磁盘，避免大文件整体驻留 JVM 堆内存。
      file-size-threshold: 0
  datasource:
    username: root
    password: 1234
    url: jdbc:mysql://localhost:3306/dds?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver

# 所有 Controller 的统一访问前缀。
# Controller 类中只声明模块自身路径，例如 /knowledge；对外访问时由这里统一增加 /api。
server:
  servlet:
    context-path: /api

# MyBatis 映射文件和字段命名转换配置。
# 数据库使用 snake_case，Java 使用 camelCase，由 MyBatis 自动完成名称映射。
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 雪花 ID 的节点号，取值范围为 0～1023。
# 多实例部署时必须为每个实例分配不同节点号，单实例开发环境使用 0 即可。
app:
  id-generator:
    worker-id: 0
  oss:
    # AccessKey ID 和 Secret 分别由 OSS_ACCESS_KEY_ID、OSS_ACCESS_KEY_SECRET 环境变量提供。
    region: cn-beijing
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucket: liliangda-oss-test
    public-base-url: https://liliangda-oss-test.oss-cn-beijing.aliyuncs.com
    key-prefix: knowledge
