spring:
  application:
    name: DQCADIRSystem
  datasource:
    username: root
    password: 1234
    url: jdbc:mysql://localhost:3306/dds?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver

# 所有 Controller 的统一访问前缀。
# Controller 类中只声明模块自身路径，例如 /knowledge；对外访问时由这里统一增加 /api。
server:
  servlet:
    context-path: /api

# MyBatis 映射文件和字段命名转换配置。
# 数据库使用 snake_case，Java 使用 camelCase，由 MyBatis 自动完成名称映射。
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 雪花 ID 的节点号，取值范围为 0～1023。
# 多实例部署时必须为每个实例分配不同节点号，单实例开发环境使用 0 即可。
app:
  id-generator:
    worker-id: 0
